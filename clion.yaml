schemaVersion: 2.2.0
metadata:
  name: cpp-clion
  displayName: C++ CLion
  description: C++ development with CLion
attributes:
  controller.devfile.io/storage-type: per-user
  che.eclipse.org/che-editor: che-incubator/clion/latest
components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 4Gi
      memoryRequest: 512Mi
      cpuLimit: "2"
      cpuRequest: "500m"
      mountSources: true
